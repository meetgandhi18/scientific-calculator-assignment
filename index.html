<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Scientific Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="index.css">

</head>

<body>

    <div class="calculator">

        <!-- Display -->
        <input type="text"
               class="form-control display mb-3"
               value="0"
               readonly>

        <!-- DEG / F-E -->
        <div class="d-flex gap-4 mb-2 px-1 mode-row text-muted">
            <span id="degToggle">DEG</span>
            <span>F-E</span>
        </div>

        <!-- Memory Buttons -->
        <div class="d-flex justify-content-between mb-3 px-1 memory-row">
            <button class="btn btn-link text-muted p-0 btn-calc" data-action="mc">MC</button>
            <button class="btn btn-link text-muted p-0 btn-calc" data-action="mr">MR</button>
            <button class="btn btn-link text-dark p-0 btn-calc"  data-action="mplus">M+</button>
            <button class="btn btn-link text-dark p-0 btn-calc"  data-action="mminus">M-</button>
            <button class="btn btn-link text-dark p-0 btn-calc"  data-action="ms">MS</button>
        </div>

        <!-- Dropdown for Trigonometry and Function -->
        <div class="mb-3">
            <select class="form-select" id="modeSelector">
                <option value="">Select Mode</option>
                <option value="trig">Trigonometry</option>
                <option value="func">Function</option>
            </select>
        </div>

        <!-- Trigonometry Buttons -->
        <div class="row g-2 mb-3 trig-section" id="trigSection">
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="sin">sin</button></div>
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="cos">cos</button></div>
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="tan">tan</button></div>
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="sec">sec</button></div>
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="csc">csc</button></div>
            <div class="col-4"><button class="btn btn-light btn-calc w-100" data-action="cot">cot</button></div>
        </div>

        <div class="row  row g-2 mb-3 function-section" id="functionSection">
            <div class="col-3"><button class="btn btn-light btn-calc w-100" data-action="floor">floor</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc w-100" data-action="ceil">ceil</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc w-100" data-action="round">round</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc w-100" data-action="cube">x<sup>3</sup></button></div>
        </div>


        <div class="row row-cols-5 g-2">

            <!-- Row 1 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="second">2<sup>nd</sup></button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="Math.PI" data-display="3.14159265359">&pi;</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="Math.E" data-display="2.718281828459045">e</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="clear">C</button></div>
            <div class="col">
                <button class="btn btn-light btn-calc w-100" data-action="backspace">
                    <i class="bi bi-backspace"></i>
                </button>
            </div>

            <!-- Row 2 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="square">x<sup>2</sup></button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="reciprocal">1/x</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="absolute">|x|</button></div>

            <!--  Math Expression Written 2 exp 3 = 2*10**3-->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="*10**" data-action="exp">exp</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="%">mod</button></div>

            <!-- Row 3 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="sqrt">&radic;x</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="(">(</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value=")">)</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="factorial">n!</button></div>
            <div class="col"><button class="btn btn-warning btn-calc w-100" data-value="/">&divide;</button></div>

            <!-- Row 4 -->
            <!-- Math Expression Written 2 x^y 3 = 2^3 = 8 Js Handle Power Using ** 2**3 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="**" data-display="^">x<sup>y</sup></button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="7">7</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="8">8</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="9">9</button></div>
            <div class="col"><button class="btn btn-warning btn-calc w-100" data-value="*">×</button></div>

            <!-- Row 5 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="tenpower">10<sup>x</sup></button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="4">4</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="5">5</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="6">6</button></div>
            <div class="col"><button class="btn btn-warning btn-calc w-100" data-value="-">−</button></div>

            <!-- Row 6 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="log">log</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="1">1</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="2">2</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="3">3</button></div>
            <div class="col"><button class="btn btn-warning btn-calc w-100" data-value="+">+</button></div>

            <!-- Row 7 -->
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="ln">ln</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-action="toggleSign">&plusmn;</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value="0">0</button></div>
            <div class="col"><button class="btn btn-light btn-calc w-100" data-value=".">.</button></div>
            <div class="col"><button class="btn btn-primary btn-calc w-100" data-action="calculate"> = </button></div>

        </div>

        <div class="mt-3 mb-2">
            <div class="d-flex justify-content-between">
                <strong>History</strong>
                <button class="btn btn-sm btn-danger" id="clearHistory">Clear</button>
            </div>

            <div id="historyList"></div>
        </div>       

    </div>

    <script src="modeSelection.js"></script>
    <script type="module" src="index.js"></script>

</body>

</html>
